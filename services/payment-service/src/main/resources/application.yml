server:
  port: ${SERVER_PORT:3003}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:10}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    mbeanregistry:
      enabled: true

spring:
  application:
    name: payment-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/payments}
    username: ${DB_USERNAME:payments_user}
    password: ${DB_PASSWORD:payments_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:bugbuster}
    password: ${RABBITMQ_PASSWORD:bugbuster}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","logger":"%logger","message":"%msg","thread":"%thread"}%n'
  level:
    root: INFO
    com.bugbuster.payment: INFO
