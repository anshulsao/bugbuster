version: "3.9"

services:
  # ─── OPENTELEMETRY COLLECTOR ───────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./observability/otel-collector/config.yml:/etc/otelcol/config.yml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8888"   # Collector metrics
    networks:
      - bugbuster

  # ─── JAEGER (TRACING) ─────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector
    networks:
      - bugbuster

  # ─── PROMETHEUS (METRICS) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    networks:
      - bugbuster

  # ─── LOKI (LOGS) ──────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - bugbuster

  # ─── PROMTAIL (LOG SHIPPER) ────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/loki/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - bugbuster

  # ─── GRAFANA (DASHBOARDS) ─────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: bugbuster
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - bugbuster

networks:
  bugbuster:
